services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: securekit-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true

  # ── Frontend (Vite React) ──────────────────────────────────────────────────
  - type: web
    name: securekit
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -l $PORT
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: VITE_API_BASE_URL
        value: https://securekit-api.onrender.com
    autoDeploy: true